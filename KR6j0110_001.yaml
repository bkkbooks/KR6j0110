body:
  text: 歸命大智海毗盧遮那如來祕密主金剛手大菩薩我善無畏蒙佛聖旨竊案梵本聊得修三密門祕密軌則所以今説釋迦世尊修瑜伽行欲修此法者先發無上正真之心身著忍辱聖衣口常讀誦􅝝如是三密相應不違然後往詣瑜伽阿闍梨所受祕密儀持念修行速得成就毗盧遮那言彼阿闍梨若見衆生堪為法器遠離諸垢有大信解勤勇深信常念利他若弟子具如是相貌者阿闍梨應自往勸發之復有二種弟子一者已發菩提心師往弟子所而勸進二者未發菩提心弟子往師所而勸進其中有智最為殊勝如是知已乃可傳受金剛手菩薩白毗盧遮那佛言我見佛色身戴大寶冠冠中現五佛標非因非果處大月輪住於虛空常寂光處恆説金剛祕密之教聲聞緣覺所不能知或居蓮華臺上現報佛身更説金剛一乘法界唯心無上祕法我等依內證之德常見常聞唯諸新發者迷惑不解唯願世尊隨衆生意而作利益佛若許可我欲宣説如來應現釋迦牟曩曳法為諸愚人得佛慧故唯願如來隨機説法聞方便慧令諸衆生示真實相悟金剛乘入阿字門説是語已毗盧遮那言善哉普賢能知我心令我生悅我於昔時修三密門證執金剛乃坐金剛妙菩提座降伏衆魔成等正覺從是以來經於多世而諸衆生由宿福故雖會我所隨機得見任根得聞如汝見我於色界頂第四靜慮成等正覺即下蘇彌盧頂於金剛大因陀羅壇一切如來請我轉法四種輪一一輪中各有三十七聖者住非愍三昧降衆天魔令入正見今正是時更欲演説大乘無上祕法然後當歸圓寂之道如來祕密神通之力無智人中勿妄宣傳我今聽許宜應速説我之應形隨類之法汝依真實法儀應説應祕説是語已寂然而坐于時金剛手心懷踊躍乃現衆前而説是法若欲報無上世尊恩德者先作曼荼羅其中央畫釋迦牟曩像金色之身具四八相被服袈裟應身説法相智手吉祥印理手向上置智前於白蓮花臺結跏趺坐普賢文殊觀音彌勒住於四隅如胎藏説各坐蓮花半跏而居於佛前有如來鉢於佛右邊有賢瓶含花於佛後有錫杖於佛左邊有寶螺各安蓮葉上光炎圍繞畫曼荼羅已於空間寂寞仙人得道所或淨室或舍利塔前或山頂樹下在一處安置曼荼羅次設壇場莊嚴供具所謂塗香時花燒香飲食燈明及與閼伽香水以為六種或有智慧以理為供晝夜三時澡浴身體或觀理以真實明灑頂為水每到道場時作禮禮有三種一者音禮二者心禮三者身禮是則三業禮拜也若行若住若坐若臥稱南謨字是為音禮復於恆時雖不出音歸唯心中觀世尊德隨喜歸命是為心禮復五輪著地額二手二膝也神心回轉故名為輪或作合掌低頭是為身禮禮者要不須身投地但歸敬為禮所以稽吾上頭而觸世尊之下足故名稽首次懺悔罪障事理二懺次隨喜聖凡德次請佛住世次回向發願然後廣陳供養而作念誦轉大乘經隨意作之若住此法所須皆成不轉此身見佛色身生生世世離諸惡趣常得興法利生之德疾證無上正等菩提隨根得成若求仙果佛現瞿曇仙而為説法若求大乘普賢現身而為説法漸漸誘彼令入佛道次説手印如來鉢印先以右手當心仰掌次以左手掌覆合右手掌上其左小指頭與右大指頭相拄其左大指頭與右小指頭相拄印呪曰娜莫三曼多勃馱南唵路迦播羅地恥多馱羅野馱羅野藥可反摩訶那皤引嚩勃馱播怛羅二合莎訶是法印呪具大精進常為一切如來神力而加護之當結是印并誦此呪一遍終稱憶地獄餓鬼有情滿百八遍則得地獄一切餓鬼飽食諸食若曠野行亦結此印并誦是呪則得曠野一切鬼神不相嬈若欲飛鉢亦用此印呪也次如來甘露印以右手大母指橫押頭指中指無名指小指甲呪曰歸命如前唵印倪魚枳反𩕳部哆得賀反𩕳莎訶是印呪能令持者證甘露法大解脫門次如來錫杖印先以右手大母指橫屈入掌以頭指無名指小指急握作拳屈肘掌當前平申其左手把袈裟角出頭四寸亦屈肘當前平申呪曰歸命如前唵度那奴箇反咨馱羅拏吽是法呪善根成就慈願圓滿若遇諸惡一切有情則結是印用擁護身次大法螺真言印定慧虛心合掌屈風空交呪曰歸命如前暗近口吹之如吹螺之狀左右旋轉次根本毗盧遮那化身印定手水空相捻慧手亦爾二手水空共相著餘地火風三指散竪釋迦文佛真言曰曩莫糝曼多沒馱引喃婆薩縛吃里二合捨涅素娜曩薩嚩達磨嚩無鉢反始多鉢羅二合鉢哆誐誐曩三摩三摩娑嚩二合賀引以是真言專注念誦讚應身曰嚩每迦旨囉娑哆劈曩𩕳素多曩娑怛鑁三合一跛曬迦賀娑多二合鼻里二合俱胝二合穆佉髻迦羅引乞懺二合二若悉底哩野四合地尾罽引爾娜縛哩鉢羅底僧娑覩二合多引娑怛鑁三合阿引哩摘曩麼儞野二合阿者攞制吒去南引弭地焰去供養儀式勸請奉送皆依如來部應修之如蘇悉地等説以佛眼尊為部母以難勝忿怒為結護明王又名無能勝如是勸修然後出道場轉誦大乘心常繫一實境無有間斷是法易成也釋迦牟曩曳微妙金剛乘法説已竟
